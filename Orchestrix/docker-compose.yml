version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Orchestrix — Docker Compose
# Services: app, ollama, prometheus, grafana
# ─────────────────────────────────────────────────────────────────

services:
  # ── Main Orchestrix ────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: orchestrix
    restart: unless-stopped
    ports:
      - "8501:8501"   # Streamlit UI
      - "8001:8001"   # Health / Prometheus metrics
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434   # point to local ollama service
    volumes:
      - ./logs:/app/logs
      - ./employee_data.csv:/app/employee_data.csv:ro
      - ./hr_policy.txt:/app/hr_policy.txt:ro
    depends_on:
      - ollama
    networks:
      - hr_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Ollama — Local LLM fallback ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hr_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hr_network
    # Pull mistral model on first startup
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull mistral &&
             wait"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]   # Remove if no GPU

  # ── Prometheus — Metrics collection ───────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: hr_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - hr_network

  # ── Grafana — Dashboards ───────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: hr_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - hr_network

networks:
  hr_network:
    driver: bridge

volumes:
  ollama_data:
  prometheus_data:
  grafana_data:
